name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - "main.js"
      - "editor.html"
      - "editor.js"
      - "styles.css"
      - "package.json"
      - "package-lock.json"
      - "windows/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    paths:
      - "main.js"
      - "editor.html"
      - "editor.js"
      - "styles.css"
      - "package.json"
      - "package-lock.json"
      - "windows/**"
      - ".github/workflows/windows-ci.yml"

jobs:
  build-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        # See note in windows-release.yml — swap back to `npm ci` once the
        # repo's package-lock.json is regenerated.
        run: npm install

      - name: Lint (no-undef gate)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build NSIS installer + win-unpacked (smoke)
        run: npm run build

      - name: Build MSIX (smoke)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File windows/msix/make-msix.ps1

      - name: Verify artifacts exist
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\ -Filter "*.exe" | Select-Object -First 1
          $msix = Get-ChildItem dist\ -Filter "*.msix" | Select-Object -First 1
          if (-not $exe) { throw "No .exe produced" }
          if (-not $msix) { throw "No .msix produced" }
          Write-Host "OK: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          Write-Host "OK: $($msix.Name) ($([math]::Round($msix.Length / 1MB, 2)) MB)"
